<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ff6f91" />
    <title>生日快乐</title>
    <style>
      :root {
        --bg-top: #fff3f7;
        --bg-bottom: #ffe2eb;
        --rose: #ff5d8f;
        --rose-deep: #e33d74;
        --gold: #ffd166;
        --ink: #4a2635;
        --muted: #8a6070;
        --card: rgba(255, 255, 255, 0.82);
        --shadow: 0 22px 70px rgba(227, 61, 116, 0.26);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--ink);
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at 20% 18%, rgba(255, 209, 102, 0.42), transparent 25%),
          radial-gradient(circle at 80% 8%, rgba(255, 93, 143, 0.28), transparent 28%),
          linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        overflow-x: hidden;
      }

      body {
        min-height: 100vh;
      }

      .page {
        position: relative;
        display: grid;
        min-height: 100vh;
        padding: max(18px, env(safe-area-inset-top)) 18px max(22px, env(safe-area-inset-bottom));
        place-items: center;
      }

      .sparkles,
      .confetti {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .sparkle {
        position: absolute;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 0 16px rgba(255, 255, 255, 0.95);
        animation: float 8s linear infinite;
      }

      .card {
        position: relative;
        z-index: 1;
        width: min(430px, 100%);
        padding: 28px 22px 24px;
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 26px;
        background: var(--card);
        box-shadow: var(--shadow);
        text-align: center;
        backdrop-filter: blur(18px);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 13px;
        border-radius: 999px;
        color: var(--rose-deep);
        background: rgba(255, 93, 143, 0.11);
        font-size: 13px;
        font-weight: 700;
      }

      h1 {
        margin: 18px 0 8px;
        color: var(--rose-deep);
        font-size: clamp(34px, 9vw, 54px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .name {
        display: inline-block;
        min-width: 4em;
        color: #b83267;
        border-bottom: 3px solid rgba(255, 209, 102, 0.9);
        outline: 0;
      }

      .subtitle {
        margin: 0 auto 22px;
        max-width: 330px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.8;
      }

      .cake-wrap {
        position: relative;
        height: 205px;
        margin: 8px auto 18px;
      }

      .cake {
        position: absolute;
        left: 50%;
        bottom: 8px;
        width: 248px;
        height: 154px;
        transform: translateX(-50%);
      }

      .plate {
        position: absolute;
        left: 50%;
        bottom: 0;
        width: 268px;
        height: 28px;
        border-radius: 50%;
        background: linear-gradient(90deg, #ffc2d7, #fff, #ffc2d7);
        transform: translateX(-50%);
        opacity: 0.92;
      }

      .tier {
        position: absolute;
        left: 50%;
        border-radius: 22px 22px 16px 16px;
        transform: translateX(-50%);
        box-shadow: inset 0 -12px 0 rgba(198, 76, 111, 0.13);
      }

      .tier.bottom {
        bottom: 18px;
        width: 230px;
        height: 82px;
        background: linear-gradient(180deg, #ffafcc 0 28%, #ff78a6 28% 100%);
      }

      .tier.top {
        bottom: 84px;
        width: 172px;
        height: 68px;
        background: linear-gradient(180deg, #ffe6f0 0 30%, #ff9fc1 30% 100%);
      }

      .icing {
        position: absolute;
        left: 50%;
        top: 0;
        width: 100%;
        height: 30px;
        border-radius: 22px 22px 18px 18px;
        background: #fff8fb;
        transform: translateX(-50%);
      }

      .drop {
        position: absolute;
        top: 20px;
        width: 22px;
        height: 26px;
        border-radius: 0 0 18px 18px;
        background: #fff8fb;
      }

      .drop:nth-child(2) {
        left: 30px;
      }

      .drop:nth-child(3) {
        left: 82px;
        height: 35px;
      }

      .drop:nth-child(4) {
        right: 38px;
      }

      .candle {
        position: absolute;
        left: 50%;
        bottom: 144px;
        width: 18px;
        height: 52px;
        border-radius: 9px 9px 4px 4px;
        background:
          repeating-linear-gradient(
            -35deg,
            #ff5d8f 0 8px,
            #fff 8px 15px
          );
        transform: translateX(-50%);
      }

      .flame {
        position: absolute;
        left: 50%;
        bottom: 194px;
        width: 24px;
        height: 34px;
        border-radius: 50% 50% 45% 45%;
        background: radial-gradient(circle at 50% 72%, #fff 0 18%, #ffd166 19% 54%, #ff8a00 55%);
        filter: drop-shadow(0 0 18px rgba(255, 138, 0, 0.72));
        transform: translateX(-50%);
        transform-origin: center bottom;
        animation: flame 0.95s ease-in-out infinite alternate;
      }

      .message {
        margin: 0 auto 20px;
        max-width: 342px;
        padding: 16px 15px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.64);
        color: #5f3445;
        font-size: 16px;
        line-height: 1.8;
      }

      .actions {
        display: flex;
        justify-content: center;
      }

      button {
        min-height: 46px;
        min-width: 158px;
        border: 0;
        padding: 0 24px;
        border-radius: 999px;
        color: #fff;
        background: linear-gradient(135deg, var(--rose), var(--rose-deep));
        box-shadow: 0 10px 24px rgba(227, 61, 116, 0.26);
        font: inherit;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
      }

      .confetto {
        position: absolute;
        top: -18px;
        width: 10px;
        height: 16px;
        border-radius: 3px;
        opacity: 0.88;
        animation: fall var(--duration, 4.5s) linear forwards;
      }


      @keyframes float {
        from {
          transform: translateY(100vh) scale(0.5);
          opacity: 0;
        }

        15%,
        82% {
          opacity: 0.8;
        }

        to {
          transform: translateY(-12vh) scale(1.1);
          opacity: 0;
        }
      }

      @keyframes flame {
        from {
          transform: translateX(-50%) rotate(-4deg) scale(0.94);
        }

        to {
          transform: translateX(-50%) rotate(4deg) scale(1.06);
        }
      }

      @keyframes fall {
        to {
          transform: translate3d(var(--drift, 24px), 108vh, 0) rotate(720deg);
        }
      }

      @media (max-width: 370px) {
        .card {
          padding: 24px 16px 20px;
        }

        .cake {
          transform: translateX(-50%) scale(0.88);
          transform-origin: center bottom;
        }

        .cake-wrap {
          height: 184px;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="sparkles" id="sparkles" aria-hidden="true"></div>
      <div class="confetti" id="confetti" aria-hidden="true"></div>

      <section class="card" aria-label="生日祝福卡片">
        <div class="badge">今天的主角闪亮登场</div>
        <h1>
          <span class="name" id="name">老爸</span><br />
          生日快乐
        </h1>
        <p class="subtitle">5月8号生日我永远记得</p>

        <div class="cake-wrap" aria-hidden="true">
          <div class="cake">
            <div class="plate"></div>
            <div class="tier bottom">
              <div class="icing">
                <span class="drop"></span>
                <span class="drop"></span>
                <span class="drop"></span>
              </div>
            </div>
            <div class="tier top">
              <div class="icing">
                <span class="drop"></span>
                <span class="drop"></span>
                <span class="drop"></span>
              </div>
            </div>
            <div class="candle"></div>
            <div class="flame" id="flame"></div>
          </div>
        </div>

        <p class="message" id="message">
          愿你眼里有光，心里有梦，身边有笑声。新的一岁，所有美好都在路上，也正在赶来。
        </p>

        <div class="actions">
          <button type="button" id="wishButton">点亮祝福</button>
        </div>
      </section>
    </main>

    <script>
      const confettiEl = document.querySelector("#confetti");
      const sparklesEl = document.querySelector("#sparkles");
      const wishButton = document.querySelector("#wishButton");

      const colors = ["#ff5d8f", "#ffd166", "#63d2ff", "#9b5de5", "#06d6a0", "#fff"];

      function makeSparkles() {
        for (let i = 0; i < 26; i += 1) {
          const dot = document.createElement("span");
          dot.className = "sparkle";
          dot.style.left = `${Math.random() * 100}%`;
          dot.style.animationDelay = `${Math.random() * -8}s`;
          dot.style.animationDuration = `${7 + Math.random() * 6}s`;
          sparklesEl.appendChild(dot);
        }
      }

      function makeConfetti(amount = 90) {
        for (let i = 0; i < amount; i += 1) {
          const piece = document.createElement("span");
          piece.className = "confetto";
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.background = colors[Math.floor(Math.random() * colors.length)];
          piece.style.animationDelay = `${Math.random() * 0.75}s`;
          piece.style.setProperty("--duration", `${3.2 + Math.random() * 2.8}s`);
          piece.style.setProperty("--drift", `${(Math.random() - 0.5) * 190}px`);
          confettiEl.appendChild(piece);
          setTimeout(() => piece.remove(), 6800);
        }
      }

      function playTune() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;

        const context = new AudioContext();
        const notes = [
          [392, 0], [392, 0.18], [440, 0.36], [392, 0.58], [523.25, 0.8], [493.88, 1.12],
          [392, 1.52], [392, 1.7], [440, 1.88], [392, 2.1], [587.33, 2.32], [523.25, 2.64],
        ];

        notes.forEach(([frequency, start]) => {
          const osc = context.createOscillator();
          const gain = context.createGain();
          osc.type = "sine";
          osc.frequency.value = frequency;
          gain.gain.setValueAtTime(0.0001, context.currentTime + start);
          gain.gain.exponentialRampToValueAtTime(0.18, context.currentTime + start + 0.03);
          gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + start + 0.16);
          osc.connect(gain).connect(context.destination);
          osc.start(context.currentTime + start);
          osc.stop(context.currentTime + start + 0.2);
        });
      }

      function celebrate() {
        makeConfetti();
        playTune();
        wishButton.textContent = "祝福已送达";
        setTimeout(() => {
          wishButton.textContent = "再来一次";
        }, 2200);
      }

      makeSparkles();

      wishButton.addEventListener("click", celebrate);
    </script>
  </body>
</html>
