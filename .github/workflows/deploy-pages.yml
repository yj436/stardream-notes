name: Deploy GitHub Pages

on:
  push:
    branches: ['main']
  schedule:
    - cron: '20 20 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: mysql://stardream:stardream@127.0.0.1:3306/stardream_notes
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export anime timeline data
        run: npm run content:timeline
        env:
          TIMELINE_BEFORE: 3
          TIMELINE_AFTER: 7

      - name: Build static site
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          VITE_ROUTER_MODE: hash
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Add SPA fallback
        run: node scripts/write-pages-404.mjs
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
